<!DOCTYPE html>
<html>
<head>
    <title>Edit Review</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 450px;
            margin: 80px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        label {
            font-size: 14px;
            color: #555;
        }

        input, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 6px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        textarea {
            resize: none;
        }

        .btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
        }

        .update-btn {
            background-color: #4CAF50;
            color: white;
        }

        .update-btn:hover {
            background-color: #45a049;
        }

        .back-btn {
            display: block;
            text-align: center;
            margin-top: 15px;
            text-decoration: none;
            background: #2196F3;
            color: white;
            padding: 10px;
            border-radius: 6px;
        }

        .back-btn:hover {
            background: #1976d2;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Edit Review</h2>

    <form action="/update/{{ review.id }}" method="POST">
        <label>Rating (1-5)</label>
        <input type="number" name="rating" min="1" max="5" value="{{ review.rating }}">

        <label>Comment</label>
        <textarea name="comment" rows="4">{{ review.comment }}</textarea>

        <button type="submit" class="btn update-btn">Update Review</button>
    </form>

    <a href="/reviews" class="back-btn">Back to Reviews</a>
</div>

</body>
</html>
