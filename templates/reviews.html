<!DOCTYPE html>
<html>
<head>
    <title>All Reviews</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 600px;
            margin: 50px auto;
        }

        h2 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            padding: 18px;
            margin-bottom: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.2);
        }

        .rating {
            font-size: 18px;
            font-weight: bold;
            color: #ff9800;
        }

        .comment {
            margin-top: 10px;
            font-size: 15px;
            color: #444;
        }

        .actions {
            margin-top: 15px;
        }

        .btn {
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 5px;
            font-size: 14px;
            margin-right: 10px;
            color: white;
        }

        .edit {
            background: #2196F3;
        }

        .delete {
            background: #f44336;
        }

        .edit:hover {
            background: #0b7dda;
        }

        .delete:hover {
            background: #d32f2f;
        }

        .back-btn {
            display: block;
            text-align: center;
            text-decoration: none;
            background: #4CAF50;
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 16px;
        }

        .back-btn:hover {
            background: #45a049;
        }

        .no-data {
            text-align: center;
            color: white;
            font-size: 18px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>All Reviews</h2>

    {% if reviews %}
        {% for review in reviews %}
            <div class="card">
                <div class="rating">Rating: {{ review.rating or 'N/A' }}</div>
                <div class="comment">{{ review.comment or 'No comment provided' }}</div>

                <div class="actions">
                    <a href="/edit/{{ review.id }}" class="btn edit">Edit</a>
                    <a href="/delete/{{ review.id }}" class="btn delete">Delete</a>
                </div>
            </div>
        {% endfor %}
    {% else %}
        <p class="no-data">No reviews available</p>
    {% endif %}

    <a href="/" class="back-btn">⬅ Back to Home</a>
</div>

</body>
</html>
